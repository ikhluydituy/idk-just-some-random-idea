<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi English Club</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans pb-12">

    <!-- Header & Navigasi -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between py-4 gap-4">
                <div class="flex items-center">
                    <div class="flex items-center justify-center w-10 h-10 bg-blue-600 rounded-xl text-white shadow-sm mr-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/><path d="M2 7h20"/><path d="M22 7v3a2 2 0 0 1-2 2v0a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12v0a2 2 0 0 1-2-2V7"/></svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-slate-900 leading-tight flex items-center">
                            English Club
                            <span id="dbStatusBadge" class="ml-2 px-2 py-0.5 rounded text-[10px] font-bold bg-amber-100 text-amber-700 uppercase tracking-wider">Mode Lokal</span>
                        </h1>
                        <p class="text-xs text-slate-500 font-medium">Portal Absensi Digital</p>
                    </div>
                </div>
                
                <!-- Navigasi 3 Tab -->
                <div class="flex flex-wrap gap-1 bg-slate-100 p-1 rounded-lg">
                    <button id="tabFormBtn" type="button" class="flex-1 md:flex-none flex items-center justify-center px-4 py-2 text-sm font-semibold rounded-md bg-white text-blue-700 shadow-sm transition-all whitespace-nowrap">Isi Absen</button>
                    <button id="tabMingguBtn" type="button" class="flex-1 md:flex-none flex items-center justify-center px-4 py-2 text-sm font-semibold rounded-md text-slate-600 hover:text-slate-900 transition-all whitespace-nowrap">Absen Minggu Ini</button>
                    <button id="tabRekapBtn" type="button" class="flex-1 md:flex-none flex items-center justify-center px-4 py-2 text-sm font-semibold rounded-md text-slate-600 hover:text-slate-900 transition-all whitespace-nowrap">Rekap Total</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
        
        <!-- TAB 1: FORM ABSENSI -->
        <div id="viewForm" class="fade-in block">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden max-w-lg mx-auto p-6 sm:p-8">
                <h2 class="text-2xl font-bold text-slate-900 mb-6 text-center">Halo! Silakan Absen 👋</h2>
                <form id="absensiForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Nama Lengkap</label>
                        <input type="text" id="nama" required placeholder="Contoh: Budi Santoso" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Kelas</label>
                        <select id="kelas" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none cursor-pointer bg-white">
                            <option value="" disabled selected>Pilih Kelas Anda</option>
                            <optgroup label="Kelas 7"><option value="7A">7A</option><option value="7B">7B</option><option value="7C">7C</option><option value="7D">7D</option><option value="7E">7E</option><option value="7F">7F</option></optgroup>
                            <optgroup label="Kelas 8"><option value="8A">8A</option><option value="8B">8B</option><option value="8C">8C</option><option value="8D">8D</option><option value="8E">8E</option><option value="8F">8F</option></optgroup>
                            <optgroup label="Kelas 9"><option value="9A">9A</option><option value="9B">9B</option><option value="9C">9C</option><option value="9D">9D</option><option value="9E">9E</option><option value="9F">9F</option></optgroup>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Keterangan Hari Ini</label>
                        <div class="grid grid-cols-3 gap-3">
                            <label class="status-label flex items-center justify-center px-3 py-3 border-2 rounded-xl cursor-pointer bg-blue-50 border-blue-600 text-blue-700 font-bold text-sm shadow-sm"><input type="radio" name="status" value="Hadir" checked class="hidden">Hadir</label>
                            <label class="status-label flex items-center justify-center px-3 py-3 border-2 rounded-xl cursor-pointer bg-white border-slate-200 text-slate-600 font-bold text-sm hover:bg-slate-50"><input type="radio" name="status" value="Izin" class="hidden">Izin</label>
                            <label class="status-label flex items-center justify-center px-3 py-3 border-2 rounded-xl cursor-pointer bg-white border-slate-200 text-slate-600 font-bold text-sm hover:bg-slate-50"><input type="radio" name="status" value="Sakit" class="hidden">Sakit</label>
                        </div>
                    </div>
                    <div id="alasanContainer" style="display: none;">
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Alasan Keterangan</label>
                        <textarea id="alasan" rows="3" placeholder="Tuliskan alasannya..." class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
                    </div>

                    <div id="statusMessage" style="display: none;" class="p-4 rounded-xl text-sm font-medium"></div>

                    <button type="submit" id="submitBtn" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-md">
                        Kirim Absensi
                    </button>
                </form>
            </div>
        </div>

        <!-- TAB 2: ABSEN MINGGU INI -->
        <div id="viewMinggu" style="display: none;" class="fade-in">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-100 px-5 py-3 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                    <div>
                        <span class="text-xs font-bold text-slate-600 uppercase tracking-wider block">Absen Minggu Ini</span>
                        <span class="text-[11px] text-slate-500 font-medium">Hanya menampilkan data dalam 7 hari terakhir</span>
                    </div>
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <label for="sortDropdownMinggu" class="text-xs font-semibold text-slate-600">Urutkan:</label>
                        <select id="sortDropdownMinggu" class="text-sm border border-slate-300 rounded-lg px-3 py-1.5 outline-none bg-white cursor-pointer focus:ring-2 focus:ring-blue-500 flex-1 sm:flex-none">
                            <option value="terbaru">Paling Baru</option>
                            <option value="terlama">Paling Lama</option>
                            <option value="nama">Nama (A-Z)</option>
                            <option value="kelas">Kelas (7A - 9F)</option>
                        </select>
                    </div>
                </div>
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left border-collapse min-w-[600px]">
                        <thead class="bg-white border-b border-slate-200 text-slate-600 text-xs uppercase tracking-wider">
                            <tr>
                                <th class="px-5 py-4 font-semibold">Nama</th>
                                <th class="px-5 py-4 font-semibold text-center">Kelas</th>
                                <th class="px-5 py-4 font-semibold text-center">Status</th>
                                <th class="px-5 py-4 font-semibold text-center">Waktu</th>
                                <th class="px-5 py-4 font-semibold">Alasan</th>
                            </tr>
                        </thead>
                        <tbody id="tableBodyMinggu" class="divide-y divide-slate-100 text-sm">
                            <tr><td colspan="5" class="px-5 py-10 text-center text-slate-500">Memuat Data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- TAB 3: REKAP TOTAL (DENGAN FITUR SEARCH & KARTU STATISTIK) -->
        <div id="viewRekap" style="display: none;" class="fade-in space-y-6">
            
            <!-- KARTU STATISTIK DINAMIS -->
            <div class="grid grid-cols-3 gap-4">
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col items-center justify-center">
                    <span class="text-xs font-bold text-green-600 uppercase tracking-wider mb-1">Total Hadir</span>
                    <span id="statHadir" class="text-2xl font-black text-slate-900">0</span>
                </div>
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col items-center justify-center">
                    <span class="text-xs font-bold text-amber-600 uppercase tracking-wider mb-1">Total Izin</span>
                    <span id="statIzin" class="text-2xl font-black text-slate-900">0</span>
                </div>
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col items-center justify-center">
                    <span class="text-xs font-bold text-red-600 uppercase tracking-wider mb-1">Total Sakit</span>
                    <span id="statSakit" class="text-2xl font-black text-slate-900">0</span>
                </div>
            </div>

            <!-- FITUR KONTROL: SEARCH & SORT -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-100 px-5 py-4 border-b border-slate-200 flex flex-col md:flex-row justify-between items-stretch md:items-center gap-4">
                    <!-- Input Search Nama -->
                    <div class="flex-1 relative">
                        <input type="text" id="searchNamaInput" placeholder="Cari nama siswa di sini..." class="w-full pl-4 pr-10 py-2 text-sm border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-inner">
                        <span class="absolute right-3 top-2.5 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        </span>
                    </div>
                    
                    <div class="flex items-center gap-2 justify-between md:justify-end">
                        <label for="sortDropdownRekap" class="text-xs font-semibold text-slate-600 whitespace-nowrap">Urutkan:</label>
                        <select id="sortDropdownRekap" class="text-sm border border-slate-300 rounded-lg px-3 py-1.5 outline-none bg-white cursor-pointer focus:ring-2 focus:ring-blue-500 min-w-[130px]">
                            <option value="terbaru">Paling Baru</option>
                            <option value="terlama">Paling Lama</option>
                            <option value="nama">Nama (A-Z)</option>
                            <option value="kelas">Kelas (7A - 9F)</option>
                        </select>
                    </div>
                </div>

                <!-- TABEL DATA ARSIP REKAP -->
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left border-collapse min-w-[600px]">
                        <thead class="bg-white border-b border-slate-200 text-slate-600 text-xs uppercase tracking-wider">
                            <tr>
                                <th class="px-5 py-4 font-semibold">Nama</th>
                                <th class="px-5 py-4 font-semibold text-center">Kelas</th>
                                <th class="px-5 py-4 font-semibold text-center">Status</th>
                                <th class="px-5 py-4 font-semibold text-center">Tanggal & Waktu</th>
                                <th class="px-5 py-4 font-semibold">Alasan</th>
                            </tr>
                        </thead>
                        <tbody id="tableBodyRekap" class="divide-y divide-slate-100 text-sm">
                            <tr><td colspan="5" class="px-5 py-10 text-center text-slate-500">Memuat Data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- SCRIPT UTAMA -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUiUOTAQahW0AHK6w1wmbVrkZV8p3ARfw",
            authDomain: "nanaonan-projek.firebaseapp.com",
            databaseURL: "https://nanaonan-projek-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "nanaonan-projek",
            storageBucket: "nanaonan-projek.firebasestorage.app",
            messagingSenderId: "909846530493",
            appId: "1:909846530493:web:45f20d3904e9b046cd6ad4"
        };

        const isFirebaseReady = !firebaseConfig.apiKey.includes("API_KEY_ANDA");
        
        let db = null;
        let absensiRef = null;
        window.daftarAbsensiTotal = [];

        const statusBadge = document.getElementById('dbStatusBadge');
        if (isFirebaseReady) {
            statusBadge.textContent = "Online (Firebase)";
            statusBadge.className = "ml-2 px-2 py-0.5 rounded text-[10px] font-bold bg-green-100 text-green-700 uppercase tracking-wider";
            
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            absensiRef = collection(db, 'absensi_english_club');

            onSnapshot(absensiRef, (snapshot) => {
                window.daftarAbsensiTotal = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderSistemTabel();
            });
        } else {
            const localData = localStorage.getItem('dataAbsenLokal');
            if (localData) {
                window.daftarAbsensiTotal = JSON.parse(localData);
            }
            renderSistemTabel();
        }

        function getTimestamp(item) {
            if (item.timestamp && typeof item.timestamp.toMillis === 'function') return item.timestamp.toMillis();
            if (item.timestamp && typeof item.timestamp === 'number') return item.timestamp;
            return 0;
        }

        // =========================================================
        // LOGIKA PROSES & RENDER DATA KE TABEL
        // =========================================================
        window.renderSistemTabel = function() {
            const sekarang = Date.now();
            const tujuhHariLalu = sekarang - (7 * 24 * 60 * 60 * 1000);

            renderKategoriMinggu(tujuhHariLalu);
            renderKategoriRekapTotal();
        };

        // Render Tab 2: Mingguan
        function renderKategoriMinggu(batasWaktu) {
            const tbody = document.getElementById('tableBodyMinggu');
            const sortType = document.getElementById('sortDropdownMinggu').value;
            
            let filteredData = window.daftarAbsensiTotal.filter(item => getTimestamp(item) >= batasWaktu);

            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-5 py-10 text-center text-slate-500 font-medium">Belum ada data absensi untuk minggu ini.</td></tr>`;
                return;
            }

            if (sortType === 'terbaru') filteredData.sort((a,b) => getTimestamp(b) - getTimestamp(a));
            else if (sortType === 'terlama') filteredData.sort((a,b) => getTimestamp(a) - getTimestamp(b));
            else if (sortType === 'nama') filteredData.sort((a,b) => a.nama.localeCompare(b.nama));
            else if (sortType === 'kelas') filteredData.sort((a,b) => a.kelas.localeCompare(b.kelas));

            tbody.innerHTML = filteredData.map(item => {
                let badge = item.status === 'Hadir' ? 'bg-green-100 text-green-700' : (item.status === 'Izin' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700');
                let timeStr = item.timestamp ? new Date(getTimestamp(item)).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) : '-';
                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-5 py-4 font-medium text-slate-900">${item.nama}</td>
                        <td class="px-5 py-4 text-center"><span class="px-2.5 py-1 bg-slate-100 text-slate-700 rounded-md font-bold text-xs">${item.kelas}</span></td>
                        <td class="px-5 py-4 text-center"><span class="px-3 py-1 rounded-full text-xs font-bold ${badge}">${item.status}</span></td>
                        <td class="px-5 py-4 text-center text-slate-500 text-xs">${timeStr}</td>
                        <td class="px-5 py-4 text-slate-600 text-xs truncate max-w-[150px]" title="${item.alasan}">${item.alasan}</td>
                    </tr>`;
            }).join('');
        }

        // Render Tab 3: Rekap Total + Fitur Hitung Kalkulasi Statistik & Search
        function renderKategoriRekapTotal() {
            const tbody = document.getElementById('tableBodyRekap');
            const sortType = document.getElementById('sortDropdownRekap').value;
            const keyword = document.getElementById('searchNamaInput').value.toLowerCase().trim();
            
            // 1. Jalankan Filter Pencarian Nama
            let filteredData = [...window.daftarAbsensiTotal];
            if (keyword !== '') {
                filteredData = filteredData.filter(item => item.nama.toLowerCase().includes(keyword));
            }

            // 2. Kalkulasi Kalkulator Indikator (Hanya menghitung data yang tersaring di layar)
            let countHadir = 0;
            let countIzin = 0;
            let countSakit = 0;

            filteredData.forEach(item => {
                if (item.status === 'Hadir') countHadir++;
                else if (item.status === 'Izin') countIzin++;
                else if (item.status === 'Sakit') countSakit++;
            });

            // Suntik angka statistik ke elemen kartu atas
            document.getElementById('statHadir').textContent = countHadir;
            document.getElementById('statIzin').textContent = countIzin;
            document.getElementById('statSakit').textContent = countSakit;

            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-5 py-10 text-center text-slate-500 font-medium">Data siswa tidak ditemukan.</td></tr>`;
                return;
            }

            // 3. Jalankan Penyortiran
            if (sortType === 'terbaru') filteredData.sort((a,b) => getTimestamp(b) - getTimestamp(a));
            else if (sortType === 'terlama') filteredData.sort((a,b) => getTimestamp(a) - getTimestamp(b));
            else if (sortType === 'nama') filteredData.sort((a,b) => a.nama.localeCompare(b.nama));
            else if (sortType === 'kelas') filteredData.sort((a,b) => a.kelas.localeCompare(b.kelas));

            // 4. Gambar data ke baris tabel
            tbody.innerHTML = filteredData.map(item => {
                let badge = item.status === 'Hadir' ? 'bg-green-100 text-green-700' : (item.status === 'Izin' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700');
                let timeStr = item.timestamp ? new Date(getTimestamp(item)).toLocaleString('id-ID', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' }) : '-';
                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-5 py-4 font-medium text-slate-900">${item.nama}</td>
                        <td class="px-5 py-4 text-center"><span class="px-2.5 py-1 bg-slate-100 text-slate-700 rounded-md font-bold text-xs">${item.kelas}</span></td>
                        <td class="px-5 py-4 text-center"><span class="px-3 py-1 rounded-full text-xs font-bold ${badge}">${item.status}</span></td>
                        <td class="px-5 py-4 text-center text-slate-500 text-xs">${timeStr}</td>
                        <td class="px-5 py-4 text-slate-600 text-xs truncate max-w-[150px]" title="${item.alasan}">${item.alasan}</td>
                    </tr>`;
            }).join('');
        }

        // Event Listener untuk Fitur Filter Real-time
        document.getElementById('searchNamaInput').addEventListener('input', renderKategoriRekapTotal);
        document.getElementById('sortDropdownMinggu').addEventListener('change', window.renderSistemTabel);
        document.getElementById('sortDropdownRekap').addEventListener('change', window.renderSistemTabel);

        // =========================================================
        // LOGIKA INTERAKSI NAVIGASI TAB
        // =========================================================
        const btnForm = document.getElementById('tabFormBtn');
        const btnMinggu = document.getElementById('tabMingguBtn');
        const btnRekap = document.getElementById('tabRekapBtn');

        const viewForm = document.getElementById('viewForm');
        const viewMinggu = document.getElementById('viewMinggu');
        const viewRekap = document.getElementById('viewRekap');

        function resetTabStyle() {
            const defaultClass = "flex-1 md:flex-none flex items-center justify-center px-4 py-2 text-sm font-semibold rounded-md text-slate-600 hover:text-slate-900 transition-all whitespace-nowrap";
            btnForm.className = defaultClass;
            btnMinggu.className = defaultClass;
            btnRekap.className = defaultClass;
            
            viewForm.style.display = 'none';
            viewMinggu.style.display = 'none';
            viewRekap.style.display = 'none';
        }

        btnForm.addEventListener('click', () => {
            resetTabStyle();
            btnForm.className = "flex-1 md:flex-none flex items-center justify-center px-4 py-2 text-sm font-semibold rounded-md bg-white text-blue-700 shadow-sm transition-all whitespace-nowrap";
            viewForm.style.display = 'block';
        });

        btnMinggu.addEventListener('click', () => {
            resetTabStyle();
            btnMinggu.className = "flex-1 md:flex-none flex items-center justify-center px-4 py-2 text-sm font-semibold rounded-md bg-white text-blue-700 shadow-sm transition-all whitespace-nowrap";
            viewMinggu.style.display = 'block';
            window.renderSistemTabel();
        });

        btnRekap.addEventListener('click', () => {
            resetTabStyle();
            btnRekap.className = "flex-1 md:flex-none flex items-center justify-center px-4 py-2 text-sm font-semibold rounded-md bg-white text-blue-700 shadow-sm transition-all whitespace-nowrap";
            viewRekap.style.display = 'block';
            window.renderSistemTabel();
        });

        // Logika Pilihan Status Form
        document.querySelectorAll('input[name="status"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.status-label').forEach(label => label.className = "status-label flex items-center justify-center px-3 py-3 border-2 rounded-xl cursor-pointer bg-white border-slate-200 text-slate-600 font-bold text-sm hover:bg-slate-50");
                this.parentElement.className = "status-label flex items-center justify-center px-3 py-3 border-2 rounded-xl cursor-pointer bg-blue-50 border-blue-600 text-blue-700 font-bold text-sm shadow-sm";
                
                if(this.value === 'Hadir') {
                    document.getElementById('alasanContainer').style.display = 'none';
                    document.getElementById('alasan').removeAttribute('required');
                } else {
                    document.getElementById('alasanContainer').style.display = 'block';
                    document.getElementById('alasan').setAttribute('required', 'true');
                }
            });
        });

        // Proses Kirim Data Form
        document.getElementById('absensiForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msgBox = document.getElementById('statusMessage');
            
            const nama = document.getElementById('nama').value;
            const kelas = document.getElementById('kelas').value;
            const status = document.querySelector('input[name="status"]:checked').value;
            const alasan = document.getElementById('alasan').value || '-';

            btn.disabled = true;
            btn.textContent = "Menyimpan Data...";

            try {
                if (isFirebaseReady) {
                    await addDoc(absensiRef, { nama, kelas, status, alasan, timestamp: serverTimestamp() });
                } else {
                    await new Promise(resolve => setTimeout(resolve, 500));
                    const newData = { id: Date.now().toString(), nama, kelas, status, alasan, timestamp: Date.now() };
                    window.daftarAbsensiTotal.push(newData);
                    localStorage.setItem('dataAbsenLokal', JSON.stringify(window.daftarAbsensiTotal));
                    renderSistemTabel();
                }

                msgBox.style.display = 'block';
                msgBox.className = "p-4 rounded-xl text-sm font-medium bg-green-50 text-green-700 mt-4";
                msgBox.innerHTML = "Absensi berhasil direkam!";
                document.getElementById('absensiForm').reset();
                document.querySelector('input[value="Hadir"]').click();
                
                setTimeout(() => { 
                    msgBox.style.display = 'none'; 
                    btnMinggu.click();
                }, 1500);

            } catch (err) {
                msgBox.style.display = 'block';
                msgBox.className = "p-4 rounded-xl text-sm font-medium bg-red-50 text-red-700 mt-4";
                msgBox.innerHTML = "Gagal menyimpan data.";
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.textContent = "Kirim Absensi";
            }
        });
    </script>
</body>
</html>
